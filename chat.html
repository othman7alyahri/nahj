<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نهج | المساعد الذكي</title>
<style>
@font-face { font-family:'ThmanyahSerif'; src:url('thmanyahserifdisplay-Regular.otf') format('opentype'); }
@font-face { font-family:'ThmanyahSans'; src:url('thmanyahsans-Regular.otf') format('opentype'); }
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --purple:#6C4CF1; --purple-dark:#4F35C2; --purple-light:#EEE9FE;
  --lime:#C6F542; --lime-dark:#9DC918;
  --black:#1A1A1A; --gray:#555; --gray-light:#F5F5F5;
  --border:rgba(108,76,241,0.15);
}
html,body { height:100%; }
body { font-family:'ThmanyahSans',sans-serif; background:#FAFAF7; color:var(--black); direction:rtl; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
h1,h2,h3 { font-family:'ThmanyahSerif',serif; }

/* HEADER */
.header { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:#fff; border-bottom:0.5px solid var(--border); flex-shrink:0; z-index:10; }
.logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
.logo-icon { width:36px; height:36px; border-radius:9px; background:var(--purple); display:flex; align-items:center; justify-content:center; transition:transform 0.2s; }
.logo-icon:hover { transform:scale(1.08); }
.logo-icon svg { width:17px; height:17px; fill:white; }
.logo-divider { width:1px; height:22px; background:var(--border); }
.logo-mark { display:flex; flex-direction:column; gap:1px; }
.logo-ar { font-family:'ThmanyahSerif',serif; font-size:17px; color:var(--purple); line-height:1; }
.logo-en { font-size:9px; color:var(--gray); letter-spacing:2.5px; line-height:1; }
.user-avatar { width:34px; height:34px; border-radius:50%; background:var(--black); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform 0.2s; }
.user-avatar:hover { transform:scale(1.08); }
.user-avatar svg { width:16px; height:16px; }

/* BODY */
.body { flex:1; display:flex; overflow:hidden; position:relative; }

/* WELCOME */
.welcome { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; background:#FAFAF7; transition:opacity 0.4s,transform 0.4s; z-index:5; overflow:hidden; }
.welcome.hidden { opacity:0; transform:translateY(-16px); pointer-events:none; }
.welcome-grid { position:absolute; inset:0; background-image:linear-gradient(rgba(108,76,241,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(108,76,241,0.06) 1px,transparent 1px); background-size:36px 36px; -webkit-mask-image:linear-gradient(to bottom,black 40%,transparent 100%); mask-image:linear-gradient(to bottom,black 40%,transparent 100%); }
.worb { position:absolute; border-radius:50%; filter:blur(60px); pointer-events:none; }
.worb1 { width:300px; height:300px; background:rgba(108,76,241,0.07); top:-80px; right:-60px; }
.worb2 { width:200px; height:200px; background:rgba(198,245,66,0.1); bottom:0; left:-40px; }
.welcome-content { position:relative; z-index:2; max-width:620px; width:100%; }
.welcome-avatar { width:64px; height:64px; border-radius:50%; background:var(--purple); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; box-shadow:0 4px 20px rgba(108,76,241,0.25); }
.welcome-avatar svg { width:28px; height:28px; fill:white; }
.welcome-title { font-size:28px; color:var(--black); margin-bottom:8px; }
.welcome-sub { font-size:14px; color:var(--gray); margin-bottom:28px; line-height:1.7; }

/* WELCOME INPUT */
.welcome-input-wrap { background:#fff; border:1.5px solid rgba(108,76,241,0.25); border-radius:14px; padding:6px 6px 6px 12px; display:flex; align-items:flex-end; gap:10px; box-shadow:0 4px 20px rgba(108,76,241,0.08); transition:border-color 0.3s,box-shadow 0.3s; margin-bottom:14px; }
.welcome-input-wrap:focus-within { border-color:var(--purple); box-shadow:0 4px 24px rgba(108,76,241,0.15); }

/* UPLOAD BOX — يستبدل خانة الكتابة */
.upload-box { background:#fff; border:1.5px dashed rgba(108,76,241,0.35); border-radius:14px; padding:24px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; margin-bottom:14px; cursor:pointer; transition:all 0.3s; min-height:110px; }
.upload-box:hover { border-color:var(--purple); background:var(--purple-light); }
.upload-box.has-file { border-style:solid; border-color:var(--purple); background:var(--purple-light); }
.upload-icon { font-size:28px; }
.upload-text { font-size:13px; color:var(--gray); }
.upload-text span { color:var(--purple); font-weight:600; }
.upload-filename { font-size:12px; color:var(--purple); font-weight:500; background:#fff; padding:4px 12px; border-radius:20px; border:1px solid var(--border); }
.upload-hint { font-size:11px; color:#bbb; }
input[type=file] { display:none; }

/* PROJECT BOX */
.project-box { background:#fff; border:1.5px solid rgba(108,76,241,0.25); border-radius:14px; padding:20px; margin-bottom:14px; text-align:right; }
.project-label { font-size:13px; color:var(--gray); margin-bottom:8px; }
.project-input { width:100%; border:1px solid #e0e0e0; border-radius:9px; padding:10px 14px; font-size:14px; font-family:'ThmanyahSans',sans-serif; color:var(--black); outline:none; direction:rtl; transition:border-color 0.2s; }
.project-input:focus { border-color:var(--purple); }
.project-input::placeholder { color:#bbb; }

/* XP PROGRESS BOX */
.xp-box { background:#fff; border:1.5px solid rgba(108,76,241,0.2); border-radius:14px; padding:20px; margin-bottom:14px; }
.xp-title { font-size:14px; color:var(--black); font-weight:500; margin-bottom:14px; text-align:right; }
.xp-input-row { display:flex; gap:10px; margin-bottom:12px; }
.xp-input { flex:1; border:1px solid #e0e0e0; border-radius:9px; padding:10px 14px; font-size:13px; font-family:'ThmanyahSans',sans-serif; color:var(--black); outline:none; direction:rtl; transition:border-color 0.2s; }
.xp-input:focus { border-color:var(--purple); }
.xp-input::placeholder { color:#bbb; }
.level-btns { display:flex; gap:8px; flex-wrap:wrap; }
.level-btn { padding:7px 14px; border-radius:20px; font-size:12px; border:1px solid #e0e0e0; background:#fff; color:var(--gray); cursor:pointer; transition:all 0.2s; font-family:'ThmanyahSans',sans-serif; }
.level-btn.selected { background:var(--purple); color:var(--lime); border-color:var(--purple); }
.level-btn:hover { border-color:var(--purple); color:var(--purple); }

.welcome-input-wrap textarea { flex:1; border:none; outline:none; resize:none; font-family:'ThmanyahSans',sans-serif; font-size:14px; color:var(--black); background:transparent; padding:10px 6px; min-height:52px; line-height:1.7; direction:rtl; }
.welcome-input-wrap textarea::placeholder { color:#bbb; }
.welcome-send { background:var(--purple); color:var(--lime); border:none; border-radius:10px; padding:12px 20px; font-size:13px; cursor:pointer; font-family:'ThmanyahSans',sans-serif; font-weight:600; white-space:nowrap; margin-bottom:2px; transition:transform 0.2s,background 0.2s; }
.welcome-send:hover { transform:scale(1.05); background:var(--purple-dark); }
.welcome-send:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

.suggestions { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.suggestion-pill { background:#fff; border:1px solid rgba(108,76,241,0.18); color:var(--black); font-size:12px; padding:8px 16px; border-radius:24px; cursor:pointer; transition:all 0.2s; box-shadow:0 1px 4px rgba(0,0,0,0.04); font-family:'ThmanyahSans',sans-serif; }
.suggestion-pill:hover { background:var(--purple); color:var(--lime); border-color:var(--purple); transform:translateY(-2px); }
.suggestion-pill.active { background:var(--purple); color:var(--lime); border-color:var(--purple); }

/* BACK LINK */
.back-to-welcome { font-size:12px; color:var(--gray); cursor:pointer; margin-bottom:10px; display:inline-flex; align-items:center; gap:4px; transition:color 0.2s; }
.back-to-welcome:hover { color:var(--purple); }

/* CHAT LAYOUT */
.chat-layout { position:absolute; inset:0; display:flex; opacity:0; pointer-events:none; transition:opacity 0.4s; }
.chat-layout.visible { opacity:1; pointer-events:all; }

/* SIDEBAR */
.sidebar { width:260px; background:#fff; border-left:0.5px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-header { padding:14px 16px; border-bottom:0.5px solid var(--border); display:flex; gap:8px; }
.new-chat-btn { flex:1; display:flex; align-items:center; gap:6px; justify-content:center; background:var(--purple); color:var(--lime); padding:10px; border-radius:9px; font-size:13px; border:none; cursor:pointer; font-family:'ThmanyahSans',sans-serif; font-weight:600; transition:transform 0.2s,background 0.2s; }
.new-chat-btn:hover { background:var(--purple-dark); transform:scale(1.02); }
.new-chat-btn svg { width:14px; height:14px; fill:var(--lime); }
.home-btn { width:40px; height:40px; border-radius:9px; border:1px solid var(--border); background:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; flex-shrink:0; }
.home-btn:hover { border-color:var(--purple); background:var(--purple-light); }
.home-btn svg { width:15px; height:15px; fill:var(--gray); }
.home-btn:hover svg { fill:var(--purple); }
.sidebar-section { padding:12px 16px 4px; font-size:10px; color:#bbb; letter-spacing:1px; }
.sidebar-list { flex:1; overflow-y:auto; padding:0 8px 12px; }
.sidebar-list::-webkit-scrollbar { width:3px; }
.sidebar-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.chat-item { display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:9px; cursor:pointer; transition:background 0.2s; margin-bottom:2px; }
.chat-item:hover { background:var(--gray-light); }
.chat-item.active { background:var(--purple-light); }
.chat-item-icon { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:13px; }
.chat-item-text { flex:1; min-width:0; }
.chat-item-title { font-size:12px; color:var(--black); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-item.active .chat-item-title { color:var(--purple); font-weight:500; }
.chat-item-time { font-size:10px; color:#bbb; margin-top:1px; }

/* CHAT MAIN */
.chat-main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chat-header { padding:12px 20px; border-bottom:0.5px solid var(--border); background:#fff; display:flex; align-items:center; gap:10px; }
.chat-header-icon { font-size:20px; }
.chat-header-title { font-size:14px; color:var(--black); font-weight:500; }
.chat-header-sub { font-size:11px; color:var(--gray); }
.chat-msgs { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
.chat-msgs::-webkit-scrollbar { width:4px; }
.chat-msgs::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.msg-row { display:flex; align-items:flex-end; gap:10px; animation:msgIn 0.3s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg-row.user { flex-direction:row-reverse; }
.msg-av { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.av-ai { background:var(--purple); }
.av-ai svg { width:13px; height:13px; fill:white; }
.av-user { background:var(--black); }
.av-user svg { width:13px; height:13px; fill:#C6F542; }
.msg-bubble { max-width:72%; padding:12px 16px; border-radius:16px; font-size:13.5px; line-height:1.8; direction:rtl; text-align:right; }
.msg-bubble.ai { background:#fff; color:var(--black); border-bottom-right-radius:4px; border:0.5px solid #ebebeb; }
.msg-bubble.user { background:var(--purple); color:var(--lime); border-bottom-left-radius:4px; }

/* QUIZ CARD */
.quiz-card { background:#fff; border:0.5px solid #ebebeb; border-radius:16px; padding:18px; max-width:72%; border-bottom-right-radius:4px; animation:msgIn 0.3s ease; }
.quiz-question { font-size:14px; color:var(--black); font-weight:500; margin-bottom:14px; line-height:1.6; direction:rtl; text-align:right; }
.quiz-options { display:flex; flex-direction:column; gap:8px; }
.quiz-option { padding:10px 14px; border-radius:9px; border:1px solid #e0e0e0; font-size:13px; color:var(--black); cursor:pointer; transition:all 0.2s; text-align:right; direction:rtl; font-family:'ThmanyahSans',sans-serif; background:#fff; }
.quiz-option:hover { border-color:var(--purple); background:var(--purple-light); color:var(--purple); }
.quiz-option.correct { background:#EAF3DE; border-color:#3B6D11; color:#3B6D11; pointer-events:none; }
.quiz-option.wrong { background:#FCEBEB; border-color:#A32D2D; color:#A32D2D; pointer-events:none; }
.quiz-option.disabled { pointer-events:none; opacity:0.5; }

/* TYPING */
.typing-indicator { display:flex; gap:4px; align-items:center; padding:14px 18px; background:#fff; border-radius:16px; border-bottom-right-radius:4px; border:0.5px solid #ebebeb; width:fit-content; }
.typing-dot { width:6px; height:6px; border-radius:50%; background:var(--purple); animation:typingBounce 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay:0.2s; }
.typing-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* CHAT INPUT */
.chat-input-area { padding:14px 20px 18px; background:#fff; border-top:0.5px solid var(--border); }
.chat-input-wrap { background:#FAFAF7; border:1.5px solid rgba(108,76,241,0.2); border-radius:12px; padding:6px 6px 6px 12px; display:flex; align-items:flex-end; gap:8px; transition:border-color 0.3s,box-shadow 0.3s; }
.chat-input-wrap:focus-within { border-color:var(--purple); box-shadow:0 0 0 3px rgba(108,76,241,0.08); }
.chat-input-wrap textarea { flex:1; border:none; outline:none; resize:none; font-family:'ThmanyahSans',sans-serif; font-size:13.5px; color:var(--black); background:transparent; padding:6px 4px; min-height:36px; max-height:100px; line-height:1.6; direction:rtl; }
.chat-input-wrap textarea::placeholder { color:#bbb; }
.send-btn { width:34px; height:34px; border-radius:9px; background:var(--purple); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform 0.2s,background 0.2s; }
.send-btn:hover { transform:scale(1.08); background:var(--purple-dark); }
.send-btn svg { width:14px; height:14px; fill:var(--lime); }
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <div class="logo-divider"></div>
    <div class="logo-mark">
      <span class="logo-ar">نهج</span>
      <span class="logo-en">NAHJ</span>
    </div>
  </a>
  <div class="user-avatar">
    <svg viewBox="0 0 24 24" fill="none" stroke="#C6F542" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
  </div>
</header>

<div class="body">

  <!-- WELCOME -->
  <div class="welcome" id="welcome">
    <div class="welcome-grid"></div>
    <div class="worb worb1"></div>
    <div class="worb worb2"></div>
    <div class="welcome-content">
      <div class="welcome-avatar"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
      <h1 class="welcome-title" id="welcomeTitle">أهلاً! أنا مساعدك في نهج</h1>
      <p class="welcome-sub" id="welcomeSub">أخبرني بالمادة أو المشروع الذي تحتاج مساعدة فيه</p>

      <!-- خانة الإدخال — تتغير حسب الاقتراح -->
      <div id="inputArea">
        <!-- الافتراضي: خانة كتابة -->
        <div class="welcome-input-wrap" id="textInputWrap">
          <textarea id="welcomeInput" placeholder="اكتب مادتك أو سؤالك هنا..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleSend()}"
            oninput="autoResize(this)"></textarea>
          <button class="welcome-send" id="mainSendBtn" onclick="handleSend()">ابدأ ←</button>
        </div>
      </div>

      <div class="suggestions" id="suggestions">
        <div class="suggestion-pill" id="pill-assistant" onclick="selectService('assistant')">🤖 مساعد ذكي</div>
        <div class="suggestion-pill" id="pill-summary"   onclick="selectService('summary')">📚 تلخيص الكتاب</div>
        <div class="suggestion-pill" id="pill-quiz"      onclick="selectService('quiz')">📝 اختبارات تلقائية</div>
        <div class="suggestion-pill" id="pill-project"   onclick="selectService('project')">🏗️ بناء مشروع</div>
        <div class="suggestion-pill" id="pill-progress"  onclick="selectService('progress')">📊 تتبع التقدم</div>
      </div>
    </div>
  </div>

  <!-- CHAT LAYOUT -->
  <div class="chat-layout" id="chatLayout">
    <div class="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" onclick="newChat()">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          محادثة جديدة
        </button>
        <button class="home-btn" onclick="goHome()" title="الصفحة الرئيسية">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
      </div>
      <div class="sidebar-section">المحادثات</div>
      <div class="sidebar-list" id="sidebarList"></div>
    </div>
    <div class="chat-main">
      <div class="chat-header">
        <div class="chat-header-icon" id="chatHeaderIcon">🤖</div>
        <div>
          <div class="chat-header-title" id="chatHeaderTitle">مساعد ذكي</div>
          <div class="chat-header-sub">نهج · متصل الآن</div>
        </div>
      </div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea id="chatInput" placeholder="اكتب رسالتك..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
            oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt" onchange="handleFileSelect(this)">

<script>
const aiIcon = `<svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/></svg>`;
const userIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="#C6F542" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`;

let currentService = 'assistant';
let uploadedFile = null;
let selectedLevel = '';

const services = {
  assistant: { icon:'🤖', title:'مساعد ذكي',       greeting:'مرحباً! أنا مساعدك الذكي في نهج. اسألني أي سؤال في أي مادة وسأساعدك فوراً 😊' },
  summary:   { icon:'📚', title:'تلخيص الكتاب',    greeting:'تم رفع الكتاب بنجاح! سأقرأه وأعطيك ملخصاً شاملاً وواضحاً. لحظة من فضلك... 📖' },
  quiz:      { icon:'📝', title:'اختبارات تلقائية', greeting:'ممتاز! سأولّد لك اختباراً من محتوى الكتاب. تذكر: 4 خيارات لكل سؤال. جاهز؟ ✍️' },
  project:   { icon:'🏗️', title:'',                greeting:'' },
  progress:  { icon:'📊', title:'',                greeting:'' },
};

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

/* ── اختيار الاقتراح ── */
function selectService(type) {
  currentService = type;
  uploadedFile = null;
  selectedLevel = '';

  // تحديث الأزرار
  document.querySelectorAll('.suggestion-pill').forEach(p => p.classList.remove('active'));
  document.getElementById('pill-'+type).classList.add('active');

  const area = document.getElementById('inputArea');

  if (type === 'assistant') {
    // خانة كتابة عادية
    document.getElementById('welcomeTitle').textContent = 'أهلاً! أنا مساعدك في نهج';
    document.getElementById('welcomeSub').textContent = 'اسألني أي سؤال في أي مادة';
    area.innerHTML = `
      <div class="welcome-input-wrap" id="textInputWrap">
        <textarea id="welcomeInput" placeholder="اكتب مادتك أو سؤالك هنا..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleSend()}"
          oninput="autoResize(this)"></textarea>
        <button class="welcome-send" id="mainSendBtn" onclick="handleSend()">ابدأ ←</button>
      </div>`;

  } else if (type === 'summary' || type === 'quiz') {
    // رفع ملف
    const label = type === 'summary' ? 'تلخيص الكتاب' : 'اختبارات تلقائية';
    const sub = type === 'summary' ? 'ارفع الكتاب أو الملف وسأعطيك ملخصاً شاملاً' : 'ارفع الكتاب أو الفصل وسأولّد لك اختباراً منه';
    const btnLabel = type === 'summary' ? 'ابدأ التلخيص ←' : 'ابدأ الاختبار ←';
    document.getElementById('welcomeTitle').textContent = label;
    document.getElementById('welcomeSub').textContent = sub;
    area.innerHTML = `
      <div class="upload-box" id="uploadBox">
        <div class="upload-icon">📂</div>
        <div class="upload-text">اسحب الملف هنا أو</div>
        <label for="inlineFileInput" style="background:var(--purple);color:#C6F542;padding:8px 22px;border-radius:9px;font-size:13px;cursor:pointer;font-family:'ThmanyahSans',sans-serif;font-weight:600;">اختر ملف</label>
        <input type="file" id="inlineFileInput" accept=".pdf,.doc,.docx,.txt" style="display:none" onchange="handleInlineFileSelect(this)" />
        <div class="upload-hint">PDF · Word · TXT</div>
      </div>
      <button class="welcome-send" id="mainSendBtn" onclick="handleSend()" disabled style="width:100%;padding:12px;border-radius:10px;margin-bottom:14px;">${btnLabel}</button>`;

  } else if (type === 'project') {
    document.getElementById('welcomeTitle').textContent = 'بناء مشروع';
    document.getElementById('welcomeSub').textContent = 'أخبرني بموضوع مشروعك وسأساعدك خطوة بخطوة';
    area.innerHTML = `
      <div class="project-box">
        <div class="project-label">ما موضوع مشروعك؟</div>
        <input class="project-input" id="projectInput" type="text" placeholder="مثال: تأثير التلوث على البيئة البحرية..."
          onkeydown="if(event.key==='Enter'){handleSend()}" />
      </div>
      <button class="welcome-send" id="mainSendBtn" onclick="handleSend()" style="width:100%;padding:12px;border-radius:10px;margin-bottom:14px;">ابدأ المشروع ←</button>`;

  } else if (type === 'progress') {
    document.getElementById('welcomeTitle').textContent = 'تتبع التقدم';
    document.getElementById('welcomeSub').textContent = 'ابنِ مسارك التعليمي واكسب XP مع كل إنجاز';
    area.innerHTML = `
      <div class="xp-box">
        <div class="xp-title">ما المادة التي تريد تتبع تقدمك فيها؟</div>
        <div class="xp-input-row">
          <input class="xp-input" id="xpSubject" type="text" placeholder="مثال: فيزياء، رياضيات..." />
        </div>
        <div class="project-label" style="margin-bottom:8px;">المرحلة الدراسية:</div>
        <div class="level-btns">
          <button class="level-btn" onclick="selectLevel(this,'ابتدائي')">ابتدائي</button>
          <button class="level-btn" onclick="selectLevel(this,'متوسط')">متوسط</button>
          <button class="level-btn" onclick="selectLevel(this,'ثانوي')">ثانوي</button>
          <button class="level-btn" onclick="selectLevel(this,'جامعي')">جامعي</button>
        </div>
      </div>
      <button class="welcome-send" id="mainSendBtn" onclick="handleSend()" style="width:100%;padding:12px;border-radius:10px;margin-bottom:14px;">ابدأ المسار ←</button>`;
  }
}

function selectLevel(btn, level) {
  selectedLevel = level;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

/* ── رفع الملف ── */
function handleFileSelect(input) {
  if (!input.files[0]) return;
  uploadedFile = input.files[0];
  updateUploadBox();
}

function handleInlineFileSelect(input) {
  if (!input.files[0]) return;
  uploadedFile = input.files[0];
  updateUploadBox();
}

function updateUploadBox() {
  const box = document.getElementById('uploadBox');
  if (box) {
    box.classList.add('has-file');
    box.innerHTML = `
      <div class="upload-icon">✅</div>
      <div class="upload-filename">${uploadedFile.name}</div>
      <label for="inlineFileInput" style="font-size:11px;color:var(--purple);cursor:pointer;text-decoration:underline;">تغيير الملف</label>
      <input type="file" id="inlineFileInput" accept=".pdf,.doc,.docx,.txt" style="display:none" onchange="handleInlineFileSelect(this)" />`;
  }
  const btn = document.getElementById('mainSendBtn');
  if (btn) btn.disabled = false;
}

/* ── إرسال ── */
function handleSend() {
  const svc = currentService;

  if (svc === 'assistant') {
    const text = document.getElementById('welcomeInput')?.value.trim() || '';
    openChat('assistant', 'مساعد ذكي', text);

  } else if (svc === 'summary' || svc === 'quiz') {
    if (!uploadedFile) return;
    const chatName = uploadedFile.name.replace(/\.[^/.]+$/, '');
    openChat(svc, chatName, '');

  } else if (svc === 'project') {
    const topic = document.getElementById('projectInput')?.value.trim() || 'مشروع جديد';
    const chatName = topic.split(' ').slice(0,3).join(' ');
    openChat('project', chatName, topic);

  } else if (svc === 'progress') {
    const subject = document.getElementById('xpSubject')?.value.trim() || 'مادة';
    const level = selectedLevel || 'ثانوي';
    openChat('progress', `${subject} · ${level}`, subject);
  }
}

/* ── فتح المحادثة ── */
async function openChat(type, chatName, userText) {
  const svc = services[type] || services.assistant;
  document.getElementById('chatHeaderIcon').textContent = svc.icon;
  document.getElementById('chatHeaderTitle').textContent = chatName;
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('chatLayout').classList.add('visible');
  document.getElementById('chatMsgs').innerHTML = '';
  addToSidebar(svc.icon, chatName);

  await sleep(300);

  if (type === 'assistant') {
    addMessage('ai', svc.greeting);
    if (userText) { await sleep(400); addMessage('user', userText); await showTyping(); addMessage('ai', 'فهمت! دعني أساعدك في هذا. هل تريد أن نبدأ بالأساسيات؟'); }

  } else if (type === 'summary') {
    addMessage('ai', `تم استلام الملف: "${uploadedFile.name}" 📂`);
    await showTyping();
    addMessage('ai', `بدأت قراءة المحتوى... سأعطيك ملخصاً شاملاً للكتاب خلال لحظات. 📖`);
    await showTyping();
    addMessage('ai', `✅ انتهيت من القراءة! هذا ملخص الكتاب:\n\n• الفكرة الرئيسية: يتناول الكتاب المفاهيم الأساسية في الموضوع بأسلوب واضح.\n• أبرز النقاط: تم تغطية المحاور الرئيسية مع أمثلة تطبيقية.\n• الخلاصة: كتاب شامل يناسب طلاب المرحلة المتوسطة والثانوية.\n\nهل تريد توضيح أي جزء أو تلخيص فصل محدد؟`);

  } else if (type === 'quiz') {
    addMessage('ai', `ممتاز! رفعت "${uploadedFile.name}" 📝 سأولّد لك اختباراً الآن...`);
    await showTyping();
    addMessage('ai', 'إليك أول سؤال:');
    await sleep(300);
    addQuizCard(
      'ما هو تعريف القوة في الفيزياء؟',
      ['مقدار التغيير في السرعة', 'حاصل ضرب الكتلة في التسارع', 'مقدار الطاقة المبذولة', 'معدل تغيير الزمن'],
      1
    );

  } else if (type === 'project') {
    addMessage('ai', `موضوع رائع! سأساعدك في بناء مشروع "${userText}" خطوة بخطوة 🏗️`);
    await showTyping();
    addMessage('ai', `خطة المشروع المقترحة:\n\n١. المقدمة وأهمية الموضوع\n٢. الأسباب والعوامل\n٣. التأثيرات والنتائج\n٤. الحلول المقترحة\n٥. الخاتمة والتوصيات\n\nمن أي خطوة تريد نبدأ؟`);

  } else if (type === 'progress') {
    addMessage('ai', `مرحباً! سأبني لك مساراً تعليمياً في مادة "${userText}" 🗺️`);
    await showTyping();
    addMessage('ai', `⚡ مستواك الحالي: المبتدئ\n████░░░░░░  0 XP / 100\n\n🗺️ مسارك في ${userText}:\n□ الفصل 1 — المفاهيم الأساسية\n□ الفصل 2 — التطبيقات\n□ الفصل 3 — المسائل المتقدمة\n□ الفصل 4 — الاختبار الشامل\n\nهل تريد نبدأ بالفصل الأول؟ ✅`);
  }
}

/* ── إضافة رسالة ── */
function addMessage(role, text) {
  const msgs = document.getElementById('chatMsgs');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const av = document.createElement('div');
  av.className = 'msg-av ' + (role==='ai'?'av-ai':'av-user');
  av.innerHTML = role==='ai' ? aiIcon : userIcon;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + role;
  bubble.style.whiteSpace = 'pre-line';
  bubble.textContent = text;
  row.appendChild(av); row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

/* ── بطاقة اختيار ── */
function addQuizCard(question, options, correctIndex) {
  const msgs = document.getElementById('chatMsgs');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  const av = document.createElement('div');
  av.className = 'msg-av av-ai'; av.innerHTML = aiIcon;
  const card = document.createElement('div');
  card.className = 'quiz-card';
  const q = document.createElement('div');
  q.className = 'quiz-question'; q.textContent = question;
  const opts = document.createElement('div');
  opts.className = 'quiz-options';
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option'; btn.textContent = opt;
    btn.onclick = () => {
      card.querySelectorAll('.quiz-option').forEach((b,j) => {
        b.classList.remove('correct','wrong');
        b.classList.add(j===correctIndex?'correct':'disabled');
        if(j===i && i!==correctIndex) b.classList.add('wrong');
      });
      setTimeout(() => {
        addMessage('ai', i===correctIndex ? '✅ إجابة صحيحة! +15 XP 🎉' : `❌ الإجابة الصحيحة هي: "${options[correctIndex]}". حاول مرة أخرى في السؤال القادم!`);
        document.getElementById('chatMsgs').scrollTop = 99999;
      }, 400);
    };
    opts.appendChild(btn);
  });
  card.appendChild(q); card.appendChild(opts);
  row.appendChild(av); row.appendChild(card);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

/* ── مؤشر الكتابة ── */
async function showTyping() {
  const msgs = document.getElementById('chatMsgs');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  const av = document.createElement('div');
  av.className = 'msg-av av-ai'; av.innerHTML = aiIcon;
  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  row.appendChild(av); row.appendChild(ind);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  await sleep(1200);
  row.remove();
}

/* ── سايدبار ── */
function addToSidebar(icon, title) {
  const list = document.getElementById('sidebarList');
  list.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  const item = document.createElement('div');
  item.className = 'chat-item active';
  const now = new Date();
  const time = now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  item.innerHTML = `
    <div class="chat-item-icon">${icon}</div>
    <div class="chat-item-text">
      <div class="chat-item-title">${title}</div>
      <div class="chat-item-time">الآن · ${time}</div>
    </div>`;
  list.insertBefore(item, list.firstChild);
}

/* ── إرسال رسالة من المحادثة ── */
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  addMessage('user', text);
  await showTyping();
  const replies = ['فكرة ممتازة! دعني أوضح لك هذا بشكل مبسط.','سؤال رائع! هذا الموضوع مهم وسأشرحه خطوة بخطوة.','بالتأكيد! خليني أساعدك في هذا 😊','ممتاز! هل تريد أمثلة إضافية؟'];
  addMessage('ai', replies[Math.floor(Math.random()*replies.length)]);
}

/* ── محادثة جديدة ── */
function newChat() {
  document.getElementById('chatMsgs').innerHTML = '';
  uploadedFile = null;
  selectService('assistant');
  document.getElementById('welcome').classList.remove('hidden');
  document.getElementById('chatLayout').classList.remove('visible');
  setTimeout(() => {
    document.getElementById('welcome').classList.add('hidden');
    openChat('assistant', 'مساعد ذكي', '');
  }, 100);
}

function goHome() {
  document.getElementById('chatLayout').classList.remove('visible');
  document.getElementById('welcome').classList.remove('hidden');
  document.querySelectorAll('.suggestion-pill').forEach(p => p.classList.remove('active'));
  uploadedFile = null;
}
</script>
</body>
</html>
